# Деплой сайта на GitHub Pages.
#
# Зачем явный workflow вместо встроенного «deploy from branch»:
# встроенный пайплайн падал на шаге Deploy без внятной ошибки и его
# нельзя перезапустить из репозитория (05–06.07.2026).
#
# Почему два джоба: артефакт «github-pages» создаётся один раз в build;
# при повторном запуске упавшего deploy артефакт не пересоздаётся.
# (В одноджобной схеме re-run загружал второй артефакт с тем же именем,
# и deploy-pages падал: «Multiple artifacts named github-pages».)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не гонять два деплоя одновременно; недокатившийся старый отменяем.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 15
          reporting_interval: 10000
