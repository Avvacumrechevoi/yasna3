# Деплой сайта на GitHub Pages.
#
# Зачем явный workflow вместо встроенного «deploy from branch»:
# встроенный пайплайн дважды падал на шаге Deploy без внятной ошибки
# (05.07.2026, коммиты 8c80eb0 и f76f7f5) и его нельзя перезапустить
# из репозитория. Этот workflow перезапускается кнопкой Re-run
# и вручную через вкладку Actions → Deploy → Run workflow.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не гонять два деплоя одновременно; недокатившийся старый отменяем.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
